<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BLIP ARCADE</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="../icon.svg">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <!-- Must load before Emscripten so the AudioContext wrapper is in place -->
  <script src="../audio-unlock.js?v=2"></script>
  <script src="../kiosk.js?v=4"></script>
  <link rel="stylesheet" href="../kiosk.css?v=11">
  <link rel="stylesheet" href="../shell.css?v=5">
</head>
<body>

  <div id="loader">
    <div id="status">LOADING</div>
    <div id="bar-outer"><div id="bar-inner"></div></div>
  </div>

  <div id="topbar" class="kiosk-bar">
    <a id="back" class="kiosk-btn" href="../index.html">&#8592; GAMES</a>
    <span id="coins-hud" class="kiosk-hud" data-coins-hud></span>
    <button id="insert-coin-btn" class="kiosk-btn">&#x25BA; INSERT COIN</button>
  </div>

  <div id="need-coin-overlay">
    <div class="nco-msg">&#x25BA; INSERT COIN &#x25C4;</div>
  </div>

  <!-- Touch controls: shown only on touch devices -->
  <div id="touch-pad">
    <div id="dpad">
      <div class="dpad-btn" id="btn-up"    data-key="ArrowUp"    data-code="ArrowUp">&#x25B2;</div>
      <div class="dpad-btn" id="btn-left"  data-key="ArrowLeft"  data-code="ArrowLeft">&#x25C4;</div>
      <div class="dpad-btn" id="btn-right" data-key="ArrowRight" data-code="ArrowRight">&#x25BA;</div>
      <div class="dpad-btn" id="btn-down"  data-key="ArrowDown"  data-code="ArrowDown">&#x25BC;</div>
    </div>
    <div id="btn-fire" data-key=" " data-code="Space">FIRE</div>
  </div>

  <!-- Paddle dial: rally only, touch only -->
  <div id="paddle-dial">
    <div id="dial-hand"></div>
    <div id="dial-label">PADDLE</div>
  </div>

  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script src="../shell.js?v=6"></script>
  {{{ SCRIPT }}}

</body>
</html>
