<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BLIP ARCADE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.16) 3px, rgba(0,0,0,0.16) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
    }

    /* loading screen */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 50;
    }

    #status {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 6px;
      color: #32c832;
      text-shadow: 0 0 10px #32c832;
      text-transform: uppercase;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0.25; } }

    #bar-outer {
      width: 260px;
      height: 5px;
      border: 1px solid #1c1c1c;
      background: #080808;
    }

    #bar-inner {
      height: 100%;
      width: 0%;
      background: #32c832;
      box-shadow: 0 0 8px #32c832;
      transition: width .12s linear;
    }

    /* floating back button */
    #back {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: #2a2a2a;
      text-decoration: none;
      padding: 5px 9px;
      border: 1px solid #181818;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      transition: color .15s, border-color .15s;
    }
    #back:hover { color: #777; border-color: #444; }
  </style>
</head>
<body>
  <div id="loader">
    <div id="status">LOADING</div>
    <div id="bar-outer"><div id="bar-inner"></div></div>
  </div>

  <a id="back" href="../index.html">&#8592; KIOSK</a>

  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script>
    var loader   = document.getElementById('loader');
    var barInner = document.getElementById('bar-inner');
    var statusEl = document.getElementById('status');
    var canvas   = document.getElementById('canvas');
    var totalDeps = 0;

    /* Scale canvas CSS size to fill the viewport, preserving aspect ratio */
    function fillCanvas() {
      var nw = canvas.width, nh = canvas.height;
      if (!nw || !nh) return;
      var scale = Math.min(window.innerWidth / nw, window.innerHeight / nh);
      canvas.style.width  = Math.round(nw * scale) + 'px';
      canvas.style.height = Math.round(nh * scale) + 'px';
    }
    window.addEventListener('resize', fillCanvas);
    /* Poll until SDL sets the canvas dimensions, then size it */
    var fillTimer = setInterval(function() {
      if (canvas.width && canvas.height) { fillCanvas(); clearInterval(fillTimer); }
    }, 50);

    canvas.addEventListener('webglcontextlost', function(e) {
      e.preventDefault();
      alert('WebGL context lost. Please reload the page.');
    }, false);

    var Module = {
      canvas: canvas,
      setStatus: function(text) {
        if (!text) {
          loader.style.display = 'none';
          canvas.focus();
          return;
        }
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          var pct = Math.round(parseInt(m[2]) / parseInt(m[4]) * 100);
          barInner.style.width = pct + '%';
          statusEl.textContent = 'LOADING ' + pct + '%';
        } else {
          statusEl.textContent = text.toUpperCase().slice(0, 24);
        }
      },
      monitorRunDependencies: function(left) {
        if (!totalDeps) totalDeps = left;
        if (totalDeps && left) {
          var pct = Math.round((totalDeps - left) / totalDeps * 100);
          barInner.style.width = pct + '%';
          statusEl.textContent = 'LOADING ' + pct + '%';
        }
      },
      print:    function() {},
      printErr: function(t) { console.warn(t); }
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
