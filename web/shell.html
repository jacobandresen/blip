<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>BLIP ARCADE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.16) 3px, rgba(0,0,0,0.16) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      touch-action: none;
    }

    /* loading screen */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 50;
    }

    #status {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      letter-spacing: 6px;
      color: #32c832;
      text-shadow: 0 0 10px #e6dc32;
      text-transform: uppercase;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0.25; } }

    #bar-outer {
      width: 260px;
      height: 5px;
      border: 1px solid #1c1c1c;
      background: #080808;
    }

    #bar-inner {
      height: 100%;
      width: 0%;
      background: #32c832;
      box-shadow: 0 0 8px #32c832;
      transition: width .12s linear;
    }

    /* ---- bottombar ---- */
    #topbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(0,0,0,0.96);
      border-top: 1px solid #1e5c1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 200;
      gap: 10px;
    }

    #topbar a, #topbar button, #topbar span {
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #e6dc32;
      text-shadow: 0 0 10px #e6dc32;
      text-decoration: none;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }

    #back {
      padding: 9px 16px;
      border-radius: 5px;
      background: linear-gradient(to bottom, #172017, #0c150c);
      border: 1px solid #2a5a2a;
      border-bottom: 3px solid #060e06;
      box-shadow: 0 4px 10px rgba(0,0,0,0.75), inset 0 1px 0 rgba(50,200,50,0.08);
      transition: box-shadow .1s, transform .1s, border-color .15s, text-shadow .15s;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    #back:hover {
      border-color: #3a8a3a;
      border-bottom-color: #0a1e0a;
      text-shadow: 0 0 10px #e6dc32;
    }
    #back:active {
      transform: translate(-50%, calc(-50% + 2px));
      border-bottom-width: 1px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.75), inset 0 2px 5px rgba(0,0,0,0.5);
    }

    #coins-hud {
      flex: 1;
      letter-spacing: 3px;
    }

    #insert-coin-btn {
      padding: 9px 16px;
      border-radius: 5px;
      background: linear-gradient(to bottom, #172017, #0c150c);
      border: 1px solid #2a5a2a;
      border-bottom: 3px solid #060e06;
      box-shadow: 0 4px 10px rgba(0,0,0,0.75), inset 0 1px 0 rgba(50,200,50,0.08);
      transition: box-shadow .1s, transform .1s, border-color .15s, text-shadow .15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #insert-coin-btn:hover {
      border-color: #3a8a3a;
      border-bottom-color: #0a1e0a;
      text-shadow: 0 0 10px #e6dc32;
    }
    #insert-coin-btn:active {
      transform: translateY(2px);
      border-bottom-width: 1px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.75), inset 0 2px 5px rgba(0,0,0,0.5);
    }
    #insert-coin-btn.shake {
      animation: coin-shake 0.28s ease;
    }
    @keyframes coin-shake {
      0%,100% { transform: translateX(0) translateY(0); }
      20%      { transform: translateX(-4px) translateY(0); }
      40%      { transform: translateX(4px) translateY(0); }
      60%      { transform: translateX(-3px) translateY(0); }
      80%      { transform: translateX(3px) translateY(0); }
    }

    /* ---- need-coin overlay ---- */
    #need-coin-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0; right: 0;
      bottom: 56px;
      background: rgba(0,0,0,0.8);
      z-index: 150;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #need-coin-overlay.visible { display: flex; }

    #need-coin-overlay .nco-msg {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      letter-spacing: 5px;
      color: #32c832;
      text-shadow: 0 0 14px #32c832;
      text-transform: uppercase;
      animation: blink 1s step-end infinite;
    }
    #need-coin-overlay .nco-sub {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: #555;
      text-transform: uppercase;
    }

    /* ---- touch controls ---- */
    #touch-pad {
      display: none;
      pointer-events: none;
    }

    #dpad {
      position: fixed;
      bottom: calc(56px + 20px + env(safe-area-inset-bottom, 0px));
      left: 20px;
      width: 132px;
      height: 132px;
      pointer-events: auto;
      touch-action: none;
    }

    .dpad-btn {
      position: absolute;
      width: 44px;
      height: 44px;
      background: rgba(50, 200, 50, 0.12);
      border: 1px solid rgba(50, 200, 50, 0.3);
      color: rgba(50, 200, 50, 0.7);
      font-size: 16px;
      line-height: 44px;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      transition: background .05s, box-shadow .05s;
    }
    #btn-up    { top: 0;   left: 44px; }
    #btn-left  { top: 44px; left: 0;  }
    #btn-right { top: 44px; left: 88px; }
    #btn-down  { top: 88px; left: 44px; }

    .dpad-btn.active {
      background: rgba(50, 200, 50, 0.30);
      box-shadow: 0 0 10px rgba(50, 200, 50, 0.45);
      color: #32c832;
    }

    #btn-fire {
      position: fixed;
      bottom: calc(56px + 24px + env(safe-area-inset-bottom, 0px));
      right: 24px;
      width: 72px;
      height: 72px;
      background: rgba(50, 200, 50, 0.12);
      border: 2px solid rgba(50, 200, 50, 0.35);
      border-radius: 50%;
      color: rgba(50, 200, 50, 0.7);
      font-family: 'Courier New', Courier, monospace;
      font-size: 8px;
      letter-spacing: 1px;
      text-align: center;
      line-height: 72px;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      pointer-events: auto;
      transition: background .05s, box-shadow .05s;
    }
    #btn-fire.active {
      background: rgba(50, 200, 50, 0.30);
      box-shadow: 0 0 14px rgba(50, 200, 50, 0.5);
      color: #32c832;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div id="status">LOADING</div>
    <div id="bar-outer"><div id="bar-inner"></div></div>
  </div>

  <!-- Always-visible topbar -->
  <div id="topbar">
    <a id="back" href="../index.html">&#8592; GAMES</a>
    <span id="coins-hud"></span>
    <button id="insert-coin-btn">&#x25BA; INSERT COIN </button>
  </div>

  <!-- Overlay shown on game-over when 0 coins -->
  <div id="need-coin-overlay">
    <div class="nco-msg">INSERT COIN TO CONTINUE</div>
    <div class="nco-sub">&#x25BA; INSERT COIN button below &#x25C4;</div>
  </div>

  <!-- Touch controls: shown only on touch devices via JS -->
  <div id="touch-pad">
    <div id="dpad">
      <div class="dpad-btn" id="btn-up"    data-key="ArrowUp"    data-code="ArrowUp">&#x25B2;</div>
      <div class="dpad-btn" id="btn-left"  data-key="ArrowLeft"  data-code="ArrowLeft">&#x25C4;</div>
      <div class="dpad-btn" id="btn-right" data-key="ArrowRight" data-code="ArrowRight">&#x25BA;</div>
      <div class="dpad-btn" id="btn-down"  data-key="ArrowDown"  data-code="ArrowDown">&#x25BC;</div>
    </div>
    <div id="btn-fire" data-key=" " data-code="Space">FIRE</div>
  </div>

  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script>
    var TOPBAR_H  = 56;
    var MAX_COINS = 5;

    var loader    = document.getElementById('loader');
    var barInner  = document.getElementById('bar-inner');
    var statusEl  = document.getElementById('status');
    var canvas    = document.getElementById('canvas');
    var coinsHud  = document.getElementById('coins-hud');
    //var overlay   = document.getElementById('need-coin-overlay');
    var totalDeps = 0;

    /* ------------------------------------------------------------------ */
    /* Coin state — shared with kiosk via sessionStorage                   */
    /* ------------------------------------------------------------------ */
    function getCoins() {
      try {
        var n = parseInt(sessionStorage.getItem('blip-coins') || '0', 10);
        return isNaN(n) ? 0 : Math.min(Math.max(n, 0), MAX_COINS);
      } catch(e) { return 0; }
    }
    function saveCoins(n) {
      try { sessionStorage.setItem('blip-coins', n); } catch(e) {}
    }
    function updateCoinsHud() {
      var n = getCoins();
      var icons = '';
      for (var i = 0; i < MAX_COINS; i++) icons += i < n ? '●' : '○';
      coinsHud.textContent = 'COINS ' + icons;
    }
    updateCoinsHud();

    /* Block the game from restarting when there are no coins */
   // if (getCoins() <= 0) overlay.classList.add('visible');

  /*  document.addEventListener('keydown', function(e) {
      if (overlay.classList.contains('visible')) {
        e.stopPropagation();
        e.preventDefault();
      }
    }, true);*/

    /* Called from WASM update_over() — spend a coin to restart */
    window.blipSpendCoin = function() {
      var n = getCoins();
    /*  if (n <= 0) {
        overlay.classList.add('visible');
        return 0;
      }*/
      n--;
      saveCoins(n);
      updateCoinsHud();
      return 1;
    };

    /* Insert-coin button in topbar */
    document.getElementById('insert-coin-btn').addEventListener('click', function() {
      var n = getCoins();
      if (n >= MAX_COINS) {
        var btn = this;
        btn.classList.remove('shake');
        void btn.offsetWidth;
        btn.classList.add('shake');
        btn.addEventListener('animationend', function() { btn.classList.remove('shake'); }, { once: true });
        return;
      }
      n++;
      saveCoins(n);
      updateCoinsHud();
      //overlay.classList.remove('visible');
    });

    /* ------------------------------------------------------------------ */
    /* Canvas scaling — centred below the topbar                           */
    /* ------------------------------------------------------------------ */
    function fillCanvas() {
      var nw = canvas.width, nh = canvas.height;
      if (!nw || !nh) return;
      var avH   = window.innerHeight - TOPBAR_H;
      var scale = Math.min(window.innerWidth / nw, avH / nh);
      var tx    = -(nw * scale / 2);
      var ty    = -(nh * scale / 2) - TOPBAR_H / 2;
      canvas.style.setProperty(
        'transform',
        'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')',
        'important'
      );
    }
    window.addEventListener('resize', fillCanvas);
    new MutationObserver(fillCanvas).observe(canvas, {
      attributes: true, attributeFilter: ['width', 'height']
    });

    canvas.addEventListener('webglcontextlost', function(e) {
      e.preventDefault();
      alert('WebGL context lost. Please reload the page.');
    }, false);

    var Module = {
      canvas: canvas,
      setStatus: function(text) {
        if (!text) {
          loader.style.display = 'none';
          canvas.focus();
          return;
        }
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          var pct = Math.round(parseInt(m[2]) / parseInt(m[4]) * 100);
          barInner.style.width = pct + '%';
          statusEl.textContent = 'LOADING ' + pct + '%';
        } else {
          statusEl.textContent = text.toUpperCase().slice(0, 24);
        }
      },
      monitorRunDependencies: function(left) {
        if (!totalDeps) totalDeps = left;
        if (totalDeps && left) {
          var pct = Math.round((totalDeps - left) / totalDeps * 100);
          barInner.style.width = pct + '%';
          statusEl.textContent = 'LOADING ' + pct + '%';
        }
      },
      print:    function() {},
      printErr: function(t) { console.warn(t); }
    };

    /* ------------------------------------------------------------------ */
    /* Touch controls                                                       */
    /* ------------------------------------------------------------------ */
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      document.getElementById('touch-pad').style.display = 'block';

      var held = {};

      function injectKey(key, code, type) {
        window.dispatchEvent(new KeyboardEvent(type, {
          bubbles: true, cancelable: true, key: key, code: code
        }));
      }

      function pressBtn(el) {
        var code = el.dataset.code;
        if (held[code]) return;
        held[code] = true;
        el.classList.add('active');
        injectKey(el.dataset.key, code, 'keydown');
      }

      function releaseBtn(el) {
        var code = el.dataset.code;
        if (!held[code]) return;
        held[code] = false;
        el.classList.remove('active');
        injectKey(el.dataset.key, code, 'keyup');
      }

      function releaseAll() {
        document.querySelectorAll('[data-key].active').forEach(function(el) {
          releaseBtn(el);
        });
      }

      var dpad = document.getElementById('dpad');
      dpad.addEventListener('touchstart', function(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          var el = document.elementFromPoint(t.clientX, t.clientY);
          if (el && el.dataset.code) pressBtn(el);
        }
      }, { passive: false });

      dpad.addEventListener('touchmove', function(e) {
        e.preventDefault();
        releaseAll();
        for (var i = 0; i < e.touches.length; i++) {
          var t = e.touches[i];
          var el = document.elementFromPoint(t.clientX, t.clientY);
          if (el && el.dataset.code) pressBtn(el);
        }
      }, { passive: false });

      dpad.addEventListener('touchend',    function(e) { e.preventDefault(); releaseAll(); }, { passive: false });
      dpad.addEventListener('touchcancel', releaseAll);

      var fire = document.getElementById('btn-fire');
      fire.addEventListener('touchstart', function(e) {
        e.preventDefault();
        pressBtn(fire);
      }, { passive: false });
      fire.addEventListener('touchend', function(e) {
        e.preventDefault();
        releaseBtn(fire);
      }, { passive: false });
      fire.addEventListener('touchcancel', function() { releaseBtn(fire); });
    }
  </script>
  {{{ SCRIPT }}}
</body>
</html>
