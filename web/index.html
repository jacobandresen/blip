<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BLIP ARCADE</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <script src="audio-unlock.js"></script>
  <link rel="stylesheet" href="kiosk.css?v=4">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #32c832;
      --cyan:    #00c8c8;
      --magenta: #c832c8;
      --red:     #dc3232;
      --yellow:  #e6dc32;
    }

    html, body { height: 100%; }

    body {
      background: #050508;
      color: #ccc;
      font-family: 'Courier New', Courier, monospace, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 16px calc(96px + env(safe-area-inset-bottom, 0px));
      overflow-x: hidden;
    }

    /* CRT overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 99;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 98;
    }

    /* ---- header ---- */
    header {
      width: 100%;
      max-width: 900px;
      text-align: center;
      padding: 48px 0 36px;
      position: relative;
    }

    /* ---- language switcher ---- */
    .lang-switcher {
      position: fixed;
      bottom: calc(76px + env(safe-area-inset-bottom, 0px));
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: row;
      gap: 4px;
      align-items: center;
    }

    .lang-btn {
      background: none;
      border: none;
      font-size: 22px;
      line-height: 1;
      padding: 3px 0;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity .15s, filter .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .lang-btn:hover:not(.active) { opacity: 0.65; }

    .lang-btn.active {
      opacity: 1;
      filter: drop-shadow(0 0 5px var(--green));
    }

    /* ---- header text ---- */
    .marquee-line {
      font-size: 11px;
      letter-spacing: 4px;
      color: #333;
      margin-bottom: 20px;
    }

    .arcade-title {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--green);
      text-shadow:
        0 0 10px var(--green),
        0 0 30px var(--green),
        0 0 60px rgba(50,200,50,0.4);
      animation: flicker 8s infinite;
      line-height: 1;
    }

    .arcade-sub {
      font-size: clamp(.9rem, 2.5vw, 1.3rem);
      letter-spacing: .5em;
      color: #555;
      margin-top: 10px;
      text-transform: uppercase;
    }

    @keyframes flicker {
      0%, 95%, 97%, 99%, 100% { opacity: 1; }
      96%, 98% { opacity: 0.7; }
    }

    .insert-coin {
      margin-top: 28px;
      font-size: 14px;
      letter-spacing: 5px;
      color: var(--yellow);
      text-shadow: 0 0 10px var(--yellow);
      animation: blink-coin 1.1s step-end infinite;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    @keyframes blink-coin { 50% { opacity: 0; } }


    .divider {
      width: 100%;
      max-width: 900px;
      height: 1px;
      background: linear-gradient(to right, transparent, #222, transparent);
      margin: 0 auto 40px;
    }

    /* ---- game grid ---- */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    /* ---- card ---- */
    .card {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      text-decoration: none;
      color: inherit;
      border: 1px solid #1e1e1e;
      padding: 28px 24px 24px;
      background: #0a0a0c;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s, border-color .2s;
      cursor: pointer;
    }

    .card:hover { transform: translateY(-3px); }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
    }
    .card::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }

    .card-serpent    { --c: var(--green);   }
    .card-bouncer    { --c: var(--cyan);    }
    .card-galactic   { --c: var(--magenta); }
    .card-rally      { --c: var(--red);     }

    .card::before, .card::after { border-color: var(--c); }

    .card:hover {
      border-color: var(--c);
      box-shadow:
        0 0 16px rgba(0,0,0,.8),
        0 0 30px color-mix(in srgb, var(--c) 20%, transparent),
        inset 0 0 20px color-mix(in srgb, var(--c) 4%, transparent);
    }

    /* screenshot */
    .card-shot-wrap {
      width: 100%;
      aspect-ratio: 480 / 540;
      margin-bottom: 16px;
      padding: 6px;
      border: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--c) 15%, transparent);
      background: #000;
    }

    .card-shot {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: pixelated;
    }

    .card-title {
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: .2em;
      font-weight: 900;
      color: var(--c);
      text-shadow: 0 0 12px color-mix(in srgb, var(--c) 60%, transparent);
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: left;
      width: 100%;
    }

    .card-genre {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #6e8c30;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: left;
    }

    .card-desc {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.75;
      color: #6e8c30;
      text-align: left;
      letter-spacing: .04em;
      margin-bottom: 24px;
      flex: 1;
    }

    .card-controls {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #6e8c30;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: left;
    }

    .press-start {
      font-size: 11px;
      letter-spacing: 4px;
      align-self: flex-start;
      color: var(--c);
      text-shadow: 0 0 10px var(--c);
      text-transform: uppercase;
      border: 1px solid var(--c);
      padding: 8px 20px;
      animation: blink-start 1.3s step-end infinite;
      box-shadow: 0 0 10px color-mix(in srgb, var(--c) 20%, transparent);
      white-space: nowrap;
    }

    @keyframes blink-start { 50% { opacity: 0.3; } }

    .card:hover .press-start {
      animation: none;
      opacity: 1;
      box-shadow:
        0 0 16px color-mix(in srgb, var(--c) 50%, transparent),
        inset 0 0 8px color-mix(in srgb, var(--c) 15%, transparent);
    }

    /* ---- footer ---- */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
      color: #2a2a2a;
      text-transform: uppercase;
      line-height: 2;
    }

    /* ---- stars ---- */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 1px;
      height: 1px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) var(--delay) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: var(--lo); }
      to   { opacity: var(--hi); }
    }

    header, .divider, .game-grid, footer { position: relative; z-index: 1; }

    /* ---- left badge group ---- */
    .left-badges {
      position: fixed;
      bottom: calc(76px + env(safe-area-inset-bottom, 0px));
      left: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    /* ---- about badge ---- */
    .about-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #444;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s;
    }
    .about-badge:hover { color: #D97757; }
    .about-badge:hover .about-label { opacity: 1; transform: translateX(0); }
    .about-badge:hover .about-avatar {
      border-color: #D97757;
      box-shadow: 0 0 12px rgba(217,119,87,0.45);
      filter: none;
    }
    .about-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: block;
      transition: border-color .2s, box-shadow .2s, filter .2s;
      filter: grayscale(40%) brightness(0.8);
    }
    .about-label {
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      text-shadow: 0 0 8px #D97757;
      color: #D97757;
    }

    /* ---- history badge ---- */
    .history-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #888;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s;
    }
    .history-badge:hover { color: var(--yellow); }
    .history-badge:hover .history-label {
      opacity: 1;
      transform: translateX(0);
      text-shadow: 0 0 8px var(--yellow);
      color: var(--yellow);
    }
    .history-badge:hover .history-avatar {
      border-color: var(--yellow);
      box-shadow: 0 0 12px rgba(230,220,50,0.45);
      filter: none;
    }
    .history-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: block;
      transition: border-color .2s, box-shadow .2s, filter .2s;
      filter: grayscale(20%) brightness(0.7);
    }
    .history-label {
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      text-shadow: 0 0 8px var(--yellow);
      color: var(--yellow);
    }

    /* ---- mastodon badge ---- */
    .profile-badge {
      position: fixed;
      bottom: calc(76px + env(safe-area-inset-bottom, 0px));
      left: 20px;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #444;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s;
    }

    .profile-badge:hover { color: var(--green); }

    .profile-badge:hover .profile-handle { opacity: 1; transform: translateX(0); }

    .profile-handle {
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      text-shadow: 0 0 8px var(--green);
      color: var(--green);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: block;
      transition: border-color .2s, box-shadow .2s;
      image-rendering: auto;
      filter: grayscale(40%) brightness(0.8);
    }

    .profile-badge:hover .avatar {
      border-color: var(--green);
      box-shadow: 0 0 12px color-mix(in srgb, var(--green) 50%, transparent);
      filter: none;
    }
    #kiosk-coins-hud { flex: 1; }

    @keyframes konami-shake {
      0%,100% { transform: translate(0,0); }
      10%     { transform: translate(-10px,-6px); }
      20%     { transform: translate(10px,6px); }
      30%     { transform: translate(-8px,4px); }
      40%     { transform: translate(8px,-4px); }
      50%     { transform: translate(-6px,6px); }
      60%     { transform: translate(6px,-6px); }
      70%     { transform: translate(-4px,3px); }
      80%     { transform: translate(4px,-3px); }
      90%     { transform: translate(-2px,2px); }
    }
    body.konami-shake { animation: konami-shake 0.55s ease; }

  </style>
</head>
<body>

    <a class="card card-galactic" href="galactic_defender/index.html">

  <div class="lang-switcher">

  </div>

  <div class="left-badges">

      <img class="about-avatar" src="claude-avatar.svg" alt="About this experiment">

  <script>

    /* ------------------------------------------------------------------ */
    /* Language application                                                 */
    /* ------------------------------------------------------------------ */
    function applyLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });

      document.documentElement.lang = lang;
      try { localStorage.setItem('blip-lang', lang); } catch(e) {}
    }

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentLang = this.getAttribute('data-lang');
        applyLang(currentLang);
        updatePressStart();
      });
    });

    /* load saved language, fall back to browser preference, then English */
    var currentLang = 'en';
    (function() {
      var saved = null;
      try { saved = localStorage.getItem('blip-lang'); } catch(e) {}
      var browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
      currentLang = saved || (i18n[browserLang] ? browserLang : 'en');
      applyLang(currentLang);
    })();

    /* ------------------------------------------------------------------ */
    /* Coin / credits                                                       */
    /* ------------------------------------------------------------------ */
    var audioCtx = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playCoinInsert() {
      var ctx = getAudio();
      var t   = ctx.currentTime;
      [{ freq: 1047, start: 0 }, { freq: 1319, start: 0.055 }].forEach(function(note) {
        var osc  = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = note.freq;
        gain.gain.setValueAtTime(0.22, t + note.start);
        gain.gain.exponentialRampToValueAtTime(0.001, t + note.start + 0.11);
        osc.start(t + note.start);
        osc.stop(t + note.start + 0.12);
      });
    }

    function playNoRoom() {
      var ctx  = getAudio();
      var t    = ctx.currentTime;
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(65, t + 0.38);
      gain.gain.setValueAtTime(0.32, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      osc.start(t);
      osc.stop(t + 0.39);
    }

    // ---- Ambient Atari hum ----
    (function () {
      var started = false;
      function startHum() {
        if (started) return;
        started = true;
        var ctx = getAudio();

        // Power-supply drone: 58 Hz sawtooth → lowpass → barely audible
        var osc = ctx.createOscillator();
        var lpf = ctx.createBiquadFilter();
        var gMaster = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = 58;
        lpf.type = 'lowpass';
        lpf.frequency.value = 320;
        lpf.Q.value = 1.5;
        gMaster.gain.value = 0;
        osc.connect(lpf); lpf.connect(gMaster); gMaster.connect(ctx.destination);
        osc.start();
        gMaster.gain.linearRampToValueAtTime(0.014, ctx.currentTime + 5);

        scheduleGlitch(ctx);
      }

      function scheduleGlitch(ctx) {
        setTimeout(function () {
          playAtariGlitch(ctx);
          scheduleGlitch(ctx);
        }, 12000 + Math.random() * 22000);
      }

      function playAtariGlitch(ctx) {
        var t   = ctx.currentTime;
        var dur = 0.03 + Math.random() * 0.09;
        var len = Math.ceil(ctx.sampleRate * dur);
        var buf = ctx.createBuffer(1, len, ctx.sampleRate);
        var d   = buf.getChannelData(0);
        for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        var src = ctx.createBufferSource();
        var bpf = ctx.createBiquadFilter();
        var g   = ctx.createGain();
        src.buffer = buf;
        bpf.type = 'bandpass';
        bpf.frequency.value = 150 + Math.random() * 500;
        bpf.Q.value = 1;
        src.connect(bpf); bpf.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.025 + Math.random() * 0.02, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        src.start(t); src.stop(t + dur + 0.01);
      }

      ['click', 'touchstart', 'keydown'].forEach(function (ev) {
        document.addEventListener(ev, startHum, { once: true, passive: true });
      });
    }());

    function updatePressStart() {
      var key = getCoins() > 0 ? 'pressStart' : 'needCoin';
      document.querySelectorAll('.press-start').forEach(function(el) {
        el.setAttribute('data-i18n', key);
        var t = i18n[currentLang];
        if (t && t[key] !== undefined) el.innerHTML = t[key];
      });
    }

    function updateCreditsDisplay() {
      updateCoinsHud();
      updatePressStart();
    }

    updatePressStart(); // initialise to "NEED COIN" on page load
    updateCreditsDisplay();

    function flashCoins() {
      ['insert-coin', 'kiosk-coins-hud', 'kiosk-insert-btn'].forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.classList.remove('coin-flash');
        void el.offsetWidth;
        el.classList.add('coin-flash');
        el.addEventListener('animationend', function() { el.classList.remove('coin-flash'); }, { once: true });
      });
    }

    function insertCoin() {
      var n = getCoins();
      if (n < MAX_COINS) {
        saveCoins(n + 1);
        playCoinInsert();
        updateCreditsDisplay();
        flashCoins();
      } else {
        playNoRoom();
        ['insert-coin', 'kiosk-insert-btn'].forEach(function(id) {
          var el = document.getElementById(id);
          el.classList.remove('shake');
          void el.offsetWidth;
          el.classList.add('shake');
          el.addEventListener('animationend', function() { el.classList.remove('shake'); }, { once: true });
        });
      }
    }

    document.querySelectorAll('.card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        e.preventDefault();
var n = getCoins();
        if (n <= 0) { return; }
        saveCoins(n - 1);
        updateCoinsHud();
        window.location.href = card.href;
      });
    });

    document.getElementById('insert-coin').addEventListener('click', insertCoin);
    document.getElementById('kiosk-insert-btn').addEventListener('click', insertCoin);

    document.addEventListener('keydown', function(e) {
      if (e.key === '5' || e.key === 'c' || e.key === 'C') insertCoin();
      konamiCheck(e.key);
    });

    var KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    var konamiIdx = 0;
    function konamiCheck(key) {
      konamiIdx = (key === KONAMI[konamiIdx]) ? konamiIdx + 1 : (key === KONAMI[0] ? 1 : 0);
      if (konamiIdx === KONAMI.length) {
        konamiIdx = 0;
        konamiActivate();
      }
    }
    function konamiActivate() {
      var n = getCoins();
      var added = Math.min(5, MAX_COINS - n);
      saveCoins(Math.min(n + 5, MAX_COINS));
      updateCoinsHud();
      for (var i = 0; i < added; i++) {
        setTimeout(playCoinInsert, i * 90);
      }
      document.body.classList.remove('konami-shake');
      void document.body.offsetWidth;
      document.body.classList.add('konami-shake');
      document.body.addEventListener('animationend', function() {
        document.body.classList.remove('konami-shake');
      }, { once: true });
    }

    /* ------------------------------------------------------------------ */
    /* Starfield                                                            */
    /* ------------------------------------------------------------------ */
    var stars = document.getElementById('stars');
    for (var i = 0; i < 120; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = [
        'left:'    + (Math.random() * 100) + '%',
        'top:'     + (Math.random() * 100) + '%',
        '--d:'     + (2 + Math.random() * 4).toFixed(1) + 's',
        '--delay:' + (Math.random() * 4).toFixed(1) + 's',
        '--lo:'    + (0.05 + Math.random() * 0.1).toFixed(2),
        '--hi:'    + (0.3  + Math.random() * 0.5).toFixed(2),
      ].join(';');
      stars.appendChild(s);
    }
  </script>
</body>
</html>
