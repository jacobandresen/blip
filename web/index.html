<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BLIP">
  <title>BLIP ARCADE</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="kiosk.css?v=12">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #32c832;
      --cyan:    #00c8c8;
      --magenta: #c832c8;
      --red:     #dc3232;
      --yellow:  #e6dc32;
    }

    html, body { height: 100%; }

    body {
      background: #050508;
      color: #ccc;
      font-family: 'Courier New', Courier, monospace, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 16px calc(96px + env(safe-area-inset-bottom, 0px));
      overflow-x: hidden;
    }

    /* CRT overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 99;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 98;
    }

    /* ---- header ---- */
    header {
      width: 100%;
      max-width: 900px;
      text-align: center;
      padding: 48px 0 36px;
      position: relative;
    }

    /* ---- button keymap hint ---- */
    .kbd-map {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 3px;
      pointer-events: none;
      white-space: nowrap;
      color: var(--yellow);
      text-shadow: none;
      opacity: 0.2;
      margin-right: 8px;
      transition: opacity .25s, text-shadow .25s;
    }
    .kbd-map .sep { opacity: 0.5; }
    body.win-focused .kbd-map {
      opacity: 1;
      text-shadow: 0 0 8px var(--yellow);
    }
    body:has(.card:hover) .kbd-map {
      opacity: 1;
      text-shadow: 0 0 10px var(--yellow);
      animation: blink-coin 1.1s step-end infinite;
    }
    @media (hover: none) and (pointer: coarse) { .kbd-map { display: none; } }

    /* ---- language switcher ---- */
    .lang-switcher {
      position: fixed;
      bottom: calc(76px + env(safe-area-inset-bottom, 0px));
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: row;
      gap: 4px;
      align-items: center;
    }

    .lang-btn {
      background: none;
      border: none;
      font-size: 22px;
      line-height: 1;
      padding: 3px 0;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity .15s, filter .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .lang-btn:hover:not(.active) { opacity: 0.65; }

    .lang-btn.active {
      opacity: 1;
      filter: drop-shadow(0 0 5px var(--green));
    }

    /* ---- header text ---- */
    .marquee-line {
      font-size: 11px;
      letter-spacing: 4px;
      color: #333;
      margin-bottom: 20px;
    }

    .arcade-title {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--green);
      text-shadow:
        0 0 10px var(--green),
        0 0 30px var(--green),
        0 0 60px rgba(50,200,50,0.4);
      animation: flicker 8s infinite;
      line-height: 1;
    }

    .arcade-sub {
      font-size: clamp(.9rem, 2.5vw, 1.3rem);
      letter-spacing: .5em;
      color: #555;
      margin-top: 10px;
      text-transform: uppercase;
    }

    @keyframes flicker {
      0%, 95%, 97%, 99%, 100% { opacity: 1; }
      96%, 98% { opacity: 0.7; }
    }

    .insert-coin {
      margin-top: 28px;
      font-size: 14px;
      letter-spacing: 5px;
      color: var(--yellow);
      text-shadow: 0 0 10px var(--yellow);
      animation: blink-coin 1.1s step-end infinite;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    @keyframes blink-coin { 50% { opacity: 0; } }


    .divider {
      width: 100%;
      max-width: 900px;
      height: 1px;
      background: linear-gradient(to right, transparent, #222, transparent);
      margin: 0 auto 40px;
    }

    /* ---- game grid ---- */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    /* ---- card ---- */
    .card {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      text-decoration: none;
      color: inherit;
      border: 1px solid #1e1e1e;
      padding: 28px 24px 24px;
      background: #0a0a0c;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s, border-color .2s;
      cursor: pointer;
    }

    .card:hover { transform: translateY(-3px); }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
    }
    .card::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }

    .card-serpent    { --c: var(--green);   }
    .card-bouncer    { --c: var(--cyan);    }
    .card-galactic   { --c: var(--magenta); }
    .card-rally      { --c: var(--red);     }
    .card-canaris    { --c: #3296c8;        }

    /* ---- Danish-origin seal ---- */
    .badge-dk {
      position: absolute;
      top: 14px; right: 14px;
      font-size: 24px;
      line-height: 1;
      width: 52px; height: 52px;
      border: 2px solid #c8102e;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      box-shadow:
        0 0 0 3px rgba(0,0,0,.85),
        0 0 0 5px rgba(200,16,46,0.35),
        0 0 14px rgba(200,16,46,0.35);
      transform: rotate(-8deg);
      z-index: 2;
    }

    /* ---- keyboard-recommended chip ---- */
    .badge-kb {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      letter-spacing: 2px;
      color: #7a7a7a;
      border: 1px solid #2c2c2c;
      padding: 3px 10px 3px 8px;
      margin-bottom: 14px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.02);
    }

    .card::before, .card::after { border-color: var(--c); }

    .card:hover {
      border-color: var(--c);
      box-shadow:
        0 0 16px rgba(0,0,0,.8),
        0 0 30px color-mix(in srgb, var(--c) 20%, transparent),
        inset 0 0 20px color-mix(in srgb, var(--c) 4%, transparent);
    }

    /* screenshot */
    .card-shot-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 480 / 540;
      margin-bottom: 16px;
      padding: 6px;
      border: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--c) 15%, transparent);
      background: #000;
    }

    .hiscore-badge {
      position: absolute;
      bottom: 10px; right: 10px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--c) 80%, #fff);
      background: rgba(0,0,0,0.78);
      padding: 3px 7px;
      border: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
      pointer-events: none;
    }

    .card-shot {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: pixelated;
    }

    .card-title {
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: .2em;
      font-weight: 900;
      color: var(--c);
      text-shadow: 0 0 12px color-mix(in srgb, var(--c) 60%, transparent);
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: left;
      width: 100%;
    }

    .card-genre {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #6e8c30;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: left;
    }

    .card-desc {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.75;
      color: #6e8c30;
      text-align: left;
      letter-spacing: .04em;
      margin-bottom: 24px;
      flex: 1;
    }

    .card-controls {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #6e8c30;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: left;
    }

    .press-start {
      font-size: 11px;
      letter-spacing: 4px;
      align-self: flex-start;
      color: var(--c);
      text-shadow: 0 0 10px var(--c);
      text-transform: uppercase;
      border: 1px solid var(--c);
      padding: 8px 20px;
      animation: blink-start 1.3s step-end infinite;
      box-shadow: 0 0 10px color-mix(in srgb, var(--c) 20%, transparent);
      white-space: nowrap;
      /* Keep the badge (bottom: 12px right: 12px, 36px wide) from overlapping the text */
      max-width: calc(100% - 60px);
    }

    @keyframes blink-start { 50% { opacity: 0.3; } }

    @media (max-width: 520px) {
      .card        { padding-left: 40px; }
      /* Stay left-aligned so the right-side robot badge never covers the text */
      .press-start { align-self: flex-start; }
    }

    /* ---- 2-player seal ---- */
    .badge-2p {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 52px;
      height: 52px;
      border: 2px solid var(--yellow);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1px;
      color: var(--yellow);
      text-shadow: 0 0 6px var(--yellow);
      box-shadow:
        0 0 0 3px rgba(0,0,0,0.85),
        0 0 0 5px color-mix(in srgb, var(--yellow) 35%, transparent),
        0 0 14px color-mix(in srgb, var(--yellow) 35%, transparent);
      transform: rotate(12deg);
      text-align: center;
      line-height: 1.3;
      background: rgba(0,0,0,0.85);
      z-index: 2;
    }

    .card:hover .press-start {
      animation: none;
      opacity: 1;
      box-shadow:
        0 0 16px color-mix(in srgb, var(--c) 50%, transparent),
        inset 0 0 8px color-mix(in srgb, var(--c) 15%, transparent);
    }

    /* ---- footer ---- */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
      color: #2a2a2a;
      text-transform: uppercase;
      line-height: 2;
    }

    /* ---- stars ---- */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 1px;
      height: 1px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) var(--delay) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: var(--lo); }
      to   { opacity: var(--hi); }
    }

    header, .divider, .game-grid, footer { position: relative; z-index: 1; }

    /* ---- left badge group ---- */
    .left-badges {
      position: fixed;
      bottom: calc(76px + env(safe-area-inset-bottom, 0px));
      left: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    /* ---- about badge ---- */
    .about-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #444;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s;
    }
    .about-badge:hover { color: #D97757; }
    .about-badge:hover .about-label { opacity: 1; transform: translateX(0); }
    .about-badge:hover .about-avatar {
      border-color: #D97757;
      box-shadow: 0 0 12px rgba(217,119,87,0.45);
      filter: none;
    }
    .about-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: block;
      transition: border-color .2s, box-shadow .2s, filter .2s;
      filter: grayscale(40%) brightness(0.8);
    }
    .about-label {
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      text-shadow: 0 0 8px #D97757;
      color: #D97757;
    }

    /* ---- history badge ---- */
    .history-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #888;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s;
    }
    .history-badge:hover { color: var(--yellow); }
    .history-badge:hover .history-label {
      opacity: 1;
      transform: translateX(0);
      text-shadow: 0 0 8px var(--yellow);
      color: var(--yellow);
    }
    .history-badge:hover .history-avatar {
      border-color: var(--yellow);
      box-shadow: 0 0 12px rgba(230,220,50,0.45);
      filter: none;
    }
    .history-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: block;
      transition: border-color .2s, box-shadow .2s, filter .2s;
      filter: grayscale(20%) brightness(0.7);
    }
    .history-label {
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      text-shadow: 0 0 8px var(--yellow);
      color: var(--yellow);
    }

    /* ---- mastodon badge ---- */
    .profile-badge {
      position: fixed;
      bottom: calc(76px + env(safe-area-inset-bottom, 0px));
      left: 20px;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #444;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s;
    }

    .profile-badge:hover { color: var(--green); }

    .profile-badge:hover .profile-handle { opacity: 1; transform: translateX(0); }

    .profile-handle {
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      text-shadow: 0 0 8px var(--green);
      color: var(--green);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: block;
      transition: border-color .2s, box-shadow .2s;
      image-rendering: auto;
      filter: grayscale(40%) brightness(0.8);
    }

    .profile-badge:hover .avatar {
      border-color: var(--green);
      box-shadow: 0 0 12px color-mix(in srgb, var(--green) 50%, transparent);
      filter: none;
    }

    @keyframes konami-shake {
      0%,100% { transform: translate(0,0); }
      10%     { transform: translate(-10px,-6px); }
      20%     { transform: translate(10px,6px); }
      30%     { transform: translate(-8px,4px); }
      40%     { transform: translate(8px,-4px); }
      50%     { transform: translate(-6px,6px); }
      60%     { transform: translate(6px,-6px); }
      70%     { transform: translate(-4px,3px); }
      80%     { transform: translate(4px,-3px); }
      90%     { transform: translate(-2px,2px); }
    }
    body.konami-shake { animation: konami-shake 0.55s ease; }

    /* ════════════════════════════════════════════════════════════════════
       SHARE button (top-right) + toast
       ════════════════════════════════════════════════════════════════════ */
    .share-btn {
      position: fixed;
      top: calc(14px + env(safe-area-inset-top, 0px));
      right: calc(14px + env(safe-area-inset-right, 0px));
      z-index: 10001;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--yellow, #e6dc32);
      background: rgba(10, 10, 14, 0.85);
      border: 2px solid var(--yellow, #e6dc32);
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 12px color-mix(in srgb, var(--yellow, #e6dc32) 35%, transparent),
                  inset 0 0 6px rgba(0,0,0,0.5);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    .share-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.15);
      box-shadow: 0 0 18px color-mix(in srgb, var(--yellow, #e6dc32) 70%, transparent),
                  inset 0 0 6px rgba(0,0,0,0.5);
    }
    .share-btn:active { transform: translateY(0); filter: brightness(0.9); }
    .share-btn .share-icon {
      display: inline-block;
      transform: scaleX(-1);
      font-size: 16px;
      line-height: 1;
    }
    .share-toast {
      position: fixed;
      top: calc(64px + env(safe-area-inset-top, 0px));
      right: calc(14px + env(safe-area-inset-right, 0px));
      z-index: 10002;
      padding: 10px 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: #0a0a0c;
      background: var(--green, #32c832);
      box-shadow: 0 4px 18px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }
    .share-toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 520px) {
      .share-btn {
        top: calc(10px + env(safe-area-inset-top, 0px));
        right: calc(10px + env(safe-area-inset-right, 0px));
        padding: 8px 10px;
        font-size: 9px;
      }
      .share-btn .share-label { display: none; }
      .share-btn .share-icon { font-size: 18px; }
      .share-toast {
        top: calc(56px + env(safe-area-inset-top, 0px));
        right: calc(10px + env(safe-area-inset-right, 0px));
      }
    }

    /* ════════════════════════════════════════════════════════════════════
       SEE INSIDE — robot badge + flip-and-grow source-tour overlay
       ════════════════════════════════════════════════════════════════════ */

    .badge-see {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--c, #888);
      background: rgba(0,0,0,0.9);
      color: var(--c, #ccc);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      z-index: 3;
      transition: transform .18s ease, box-shadow .18s ease;
      box-shadow: 0 0 0 3px rgba(0,0,0,.6),
                  0 0 10px color-mix(in srgb, var(--c, #888) 45%, transparent);
      user-select: none;
    }
    .badge-see:hover {
      transform: scale(1.18) rotate(-6deg);
      box-shadow: 0 0 0 3px rgba(0,0,0,.6),
                  0 0 18px color-mix(in srgb, var(--c, #888) 65%, transparent);
    }
    .badge-see:active { transform: scale(0.96); }
    .badge-see-label {
      position: absolute;
      bottom: 100%; right: 0;
      margin-bottom: 5px;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--c, #aaa);
      opacity: 0;
      transition: opacity .18s;
      pointer-events: none;
      white-space: nowrap;
    }
    .card:hover .badge-see-label { opacity: 0.9; }

    /* Library card — distinct from games */
    .card-library {
      --c: #d4d4d4;
    }
    .card-library .card-shot-wrap {
      background: linear-gradient(135deg, #0a0a0c 0%, #1a1a1e 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 140px;
    }
    .card-library .lib-monogram {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--c);
      text-shadow: 0 0 14px color-mix(in srgb, var(--c) 50%, transparent);
    }
    .card-library .card-title { color: var(--c); }
    .see-how {
      margin-top: 14px;
      align-self: stretch;
      background: var(--c, #d4d4d4);
      color: #0a0a0c;
      border: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 12px 14px;
      cursor: pointer;
      text-align: center;
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3),
                  0 0 14px color-mix(in srgb, var(--c, #888) 35%, transparent);
    }
    .see-how:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.3),
                  0 0 22px color-mix(in srgb, var(--c, #888) 60%, transparent);
    }
    .see-how:active { transform: translateY(0); filter: brightness(0.95); }

    .badge-lib {
      position: absolute;
      top: 12px; right: 12px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--c);
      border: 1px solid var(--c);
      padding: 4px 10px;
      background: rgba(0,0,0,0.7);
      z-index: 2;
    }

    /* ── flip-and-grow overlay ───────────────────────────────────────── */

    .docs-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0px);
      z-index: 80;
      opacity: 0;
      transition: opacity .35s ease, backdrop-filter .35s ease, background .35s ease;
      pointer-events: none;
    }
    .docs-backdrop.open {
      opacity: 1;
      pointer-events: auto;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
    }

    .docs-flipper {
      position: fixed;
      perspective: 1800px;
      z-index: 90;
      pointer-events: none;
      transition: top .55s cubic-bezier(.25,1,.3,1),
                  left .55s cubic-bezier(.25,1,.3,1),
                  width .55s cubic-bezier(.25,1,.3,1),
                  height .55s cubic-bezier(.25,1,.3,1);
    }
    .docs-flipper.open { pointer-events: auto; }

    .docs-card {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform: rotateY(0deg);
      transition: transform .55s cubic-bezier(.25,1,.3,1);
    }
    .docs-flipper.open .docs-card { transform: rotateY(180deg); }

    .docs-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .docs-face.front {
      border: 1px solid #1e1e1e;
      background: #0a0a0c;
    }
    .docs-face.front::before, .docs-face.front::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--c, #888);
    }
    .docs-face.front::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
    .docs-face.front::after  { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }

    .docs-face.back {
      transform: rotateY(180deg);
      background: #07070a;
      border: 1px solid var(--c, #444);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4),
                  0 0 22px color-mix(in srgb, var(--c, #888) 25%, transparent);
      display: flex;
      flex-direction: column;
      color: #d0d0d0;
    }

    .docs-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid #1e1e22;
      background: rgba(255,255,255,0.015);
    }
    .docs-head .title {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--c, #fff);
      letter-spacing: 2px;
      flex: 1;
    }
    .docs-head .page-indicator {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #888;
    }
    .docs-close {
      background: var(--c, #d4d4d4);
      border: 2px solid var(--c, #d4d4d4);
      color: #0a0a0c;
      width: 44px; height: 44px;
      cursor: pointer;
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      font-family: inherit;
      border-radius: 4px;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.4),
                  0 0 16px color-mix(in srgb, var(--c, #888) 55%, transparent);
      transition: transform .15s ease, filter .15s ease, box-shadow .15s ease;
    }
    .docs-close:hover {
      filter: brightness(1.15);
      transform: scale(1.06);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.4),
                  0 0 22px color-mix(in srgb, var(--c, #888) 85%, transparent);
    }
    .docs-close:active { transform: scale(0.96); }

    .docs-body {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.4fr);
      gap: 0;
      overflow: hidden;
    }
    .docs-shot {
      background: #0a0a0e;
      display: flex; align-items: center; justify-content: center;
      padding: 18px;
      border-right: 1px solid #1a1a1e;
      overflow: hidden;
    }
    .docs-shot img {
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      border: 1px solid #2a2a2e;
    }
    .docs-shot.diagram {
      padding: 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--c, #ccc);
      line-height: 1.9;
      text-align: center;
      letter-spacing: 1.5px;
    }
    .docs-prose {
      padding: 26px 30px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.75;
      letter-spacing: 0.2px;
      color: #d4d4d4;
    }
    .docs-prose h3 {
      margin: 0 0 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--c, #fff);
      letter-spacing: 2px;
    }
    .docs-prose p { margin: 0 0 16px; }
    .docs-prose p + p { margin-top: -4px; }
    .docs-prose strong { color: #f0f0f0; }
    .docs-prose em { color: #b8b8b8; font-style: normal; border-bottom: 1px dashed #444; }
    .docs-prose code {
      font-family: 'Fira Code', 'Consolas', monospace;
      background: rgba(255,255,255,0.05);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 12.5px;
      color: var(--c, #ddd);
    }
    .docs-prose pre {
      background: #050507;
      border: 1px solid #1e1e22;
      border-left: 3px solid var(--c, #444);
      border-top-left-radius: 0;
      border-top-right-radius: 3px;
      padding: 14px 16px;
      margin: 0 0 18px;
      overflow-x: auto;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.65;
      color: #d4d4d4;
    }
    .docs-prose pre .kw  { color: #c586c0; }
    .docs-prose pre .ty  { color: #4ec9b0; }
    .docs-prose pre .fn  { color: #dcdcaa; }
    .docs-prose pre .str { color: #ce9178; }
    .docs-prose pre .num { color: #b5cea8; }
    .docs-prose pre .cmt { color: #6a9955; font-style: italic; }
    .docs-prose .path {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 10px;
      color: #8a8a8a;
      letter-spacing: 1px;
      margin: 14px 0 0;
      padding: 7px 12px;
      background: #0c0c10;
      border: 1px solid #1e1e22;
      border-bottom: none;
      text-transform: uppercase;
      text-decoration: none;
      transition: color .15s, background .15s, border-color .15s;
    }
    .docs-prose .path:hover {
      color: var(--c, #fff);
      background: #101015;
      border-color: var(--c, #444);
    }
    .docs-prose .path .path-file { font-family: 'Fira Code', 'Consolas', monospace; text-transform: none; letter-spacing: 0; }
    .docs-prose .path .path-gh {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      letter-spacing: 1.5px;
      color: var(--c, #888);
      opacity: 0.75;
    }
    .docs-prose .path:hover .path-gh { opacity: 1; }

    /* Inline GitHub link */
    .docs-prose .gh-inline {
      color: var(--c, #ccc);
      text-decoration: none;
      border-bottom: 1px dashed color-mix(in srgb, var(--c, #888) 50%, transparent);
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 12.5px;
    }
    .docs-prose .gh-inline:hover {
      border-bottom-style: solid;
      background: color-mix(in srgb, var(--c, #888) 10%, transparent);
    }

    /* File-index list (library card) */
    .docs-prose ul.gh-files {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .docs-prose ul.gh-files .gh-file {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 8px 12px;
      background: #0c0c10;
      border: 1px solid #1e1e22;
      border-left: 3px solid var(--c, #444);
      color: #c0c0c0;
      text-decoration: none;
      transition: background .15s, border-color .15s, color .15s;
    }
    .docs-prose ul.gh-files .gh-file:hover {
      background: #14141a;
      color: var(--c, #fff);
      border-left-color: var(--c, #888);
    }
    .docs-prose ul.gh-files .gh-file-name {
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 12.5px;
      color: var(--c, #fff);
      min-width: 110px;
    }
    .docs-prose ul.gh-files .gh-file-desc {
      font-size: 12px;
      color: #9a9a9a;
      flex: 1;
    }
    .docs-prose ul.gh-files .gh-file::after {
      content: '↗';
      color: #5a5a5a;
      font-size: 11px;
    }
    .docs-prose ul.gh-files .gh-file:hover::after { color: var(--c, #ccc); }
    .docs-prose .crossref {
      display: inline-block;
      margin-top: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--c, #aaa);
      border: 1px solid var(--c, #444);
      padding: 6px 10px;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
    }
    .docs-prose .crossref:hover { background: color-mix(in srgb, var(--c, #888) 12%, transparent); }

    .docs-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-top: 1px solid #1e1e22;
      background: rgba(0,0,0,0.4);
    }
    .docs-nav button {
      background: none;
      border: 1px solid #2c2c2c;
      color: #c0c0c0;
      padding: 6px 14px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
    }
    .docs-nav button:hover:not(:disabled) {
      border-color: var(--c, #aaa);
      color: var(--c, #fff);
    }
    .docs-nav button:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }
    .docs-dots {
      display: flex;
      gap: 6px;
    }
    .docs-dots span {
      width: 8px; height: 8px;
      border: 1px solid #3a3a3e;
      border-radius: 50%;
      cursor: pointer;
      transition: background .18s;
    }
    .docs-dots span.on {
      background: var(--c, #fff);
      border-color: var(--c, #fff);
    }

    @media (max-width: 700px) {
      .docs-body { grid-template-columns: 1fr; grid-template-rows: 200px 1fr; }

      .docs-prose .path               { font-size: 11px; padding: 8px 10px; }

      .docs-shot.diagram              { font-size: 12px; }
      .docs-nav button                { font-size: 10px; padding: 8px 12px; }
    }

  </style>

    /* ------------------------------------------------------------------ */
    /* Language application                                                 */
    /* ------------------------------------------------------------------ */
    function applyLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });

      document.documentElement.lang = lang;
      try { localStorage.setItem('blip-lang', lang); } catch(e) {}
    }

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentLang = this.getAttribute('data-lang');
        applyLang(currentLang);
        updatePressStart();
      });
    });

    /* load saved language, fall back to browser preference, then English */
    var currentLang = 'en';
    (function() {
      var saved = null;
      try { saved = localStorage.getItem('blip-lang'); } catch(e) {}
      var browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
      currentLang = saved || (i18n[browserLang] ? browserLang : 'en');
      applyLang(currentLang);
    })();

    /* ------------------------------------------------------------------ */
    /* Share button — native share sheet on mobile, copy-link on desktop  */
    /* ------------------------------------------------------------------ */
    (function () {
      var btn   = document.getElementById('share-btn');
      var toast = document.getElementById('share-toast');
      if (!btn) return;

      function strip(html) {
        var d = document.createElement('div');
        d.innerHTML = html;
        return d.textContent || d.innerText || '';
      }
      function flash(msg, ok) {
        toast.innerHTML = msg;
        toast.style.background = ok === false ? 'var(--red, #dc3232)' : 'var(--green, #32c832)';
        toast.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(function () { toast.classList.remove('show'); }, 2000);
      }
      btn.addEventListener('click', function () {
        var t = i18n[currentLang] || i18n.en;
        var url = window.location.origin + window.location.pathname;
        var data = {
          title: strip(t.shareTitle),
          text:  strip(t.shareText),
          url:   url
        };
        if (navigator.share) {
          navigator.share(data).catch(function () { /* user cancelled — no-op */ });
          return;
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(
            function () { flash(t.shareCopied); },
            function () { flash(t.shareFailed, false); }
          );
        } else {
          // Last-resort fallback
          var ta = document.createElement('textarea');
          ta.value = url;
          ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); flash(t.shareCopied); }
          catch (e) { flash(t.shareFailed, false); }
          document.body.removeChild(ta);
        }
      });
    })();

    /* ------------------------------------------------------------------ */
    /* Coin / credits                                                       */
    /* ------------------------------------------------------------------ */
    // ---- Ambient Atari hum ----
    (function () {
      var started = false;
      function startHum() {
        if (started) return;
        started = true;
        var ctx = getKioskAudio();

        // Power-supply drone: 58 Hz sawtooth → lowpass → barely audible
        var osc = ctx.createOscillator();
        var lpf = ctx.createBiquadFilter();
        var gMaster = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = 58;
        lpf.type = 'lowpass';
        lpf.frequency.value = 320;
        lpf.Q.value = 1.5;
        gMaster.gain.value = 0;
        osc.connect(lpf); lpf.connect(gMaster); gMaster.connect(ctx.destination);
        osc.start();
        gMaster.gain.linearRampToValueAtTime(0.014, ctx.currentTime + 5);

        scheduleGlitch(ctx);
      }

      function scheduleGlitch(ctx) {
        setTimeout(function () {
          playAtariGlitch(ctx);
          scheduleGlitch(ctx);
        }, 12000 + Math.random() * 22000);
      }

      function playAtariGlitch(ctx) {
        var t   = ctx.currentTime;
        var dur = 0.03 + Math.random() * 0.09;
        var len = Math.ceil(ctx.sampleRate * dur);
        var buf = ctx.createBuffer(1, len, ctx.sampleRate);
        var d   = buf.getChannelData(0);
        for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        var src = ctx.createBufferSource();
        var bpf = ctx.createBiquadFilter();
        var g   = ctx.createGain();
        src.buffer = buf;
        bpf.type = 'bandpass';
        bpf.frequency.value = 150 + Math.random() * 500;
        bpf.Q.value = 1;
        src.connect(bpf); bpf.connect(g); g.connect(ctx.destination);
        g.gain.setValueAtTime(0.025 + Math.random() * 0.02, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        src.start(t); src.stop(t + dur + 0.01);
      }

      ['click', 'touchstart', 'keydown'].forEach(function (ev) {
        document.addEventListener(ev, startHum, { once: true, passive: true });
      });
    }());

    window.onCoinInserted = function() { updatePressStart(); };

    function updatePressStart() {
      var key = getCoins() > 0 ? 'pressStart' : 'needCoin';
      document.querySelectorAll('.press-start').forEach(function(el) {
        el.setAttribute('data-i18n', key);
        var t = i18n[currentLang];
        if (t && t[key] !== undefined) el.innerHTML = t[key];
      });
    }

    function updateCreditsDisplay() {
      updateCoinsHud();
      updatePressStart();
    }

    updatePressStart(); // initialise to "NEED COIN" on page load
    updateCreditsDisplay();

    document.querySelectorAll('.card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        // Let nested links/buttons (Copilot, Claude, SEE HOW, robot badge…) own their own clicks.
        if (e.target.closest('a, button, .badge-see, .see-how')) return;
        // The library card has no game to launch — docs.js handles the click separately.
        if (!card.href) return;
        e.preventDefault();
        var n = getCoins();
        if (n <= 0) { return; }
        saveCoins(n - 1);
        updateCoinsHud();
        window.location.href = card.href;
      });
    });

    document.getElementById('insert-coin').addEventListener('click', insertCoin);
    document.getElementById('kiosk-insert-btn').addEventListener('click', insertCoin);

    window.addEventListener('focus', function () { document.body.classList.add('win-focused'); });
    window.addEventListener('blur',  function () { document.body.classList.remove('win-focused'); });
    if (document.hasFocus()) document.body.classList.add('win-focused');

    document.addEventListener('keydown', function(e) {
      if (e.key === '5' || e.key === 'c' || e.key === 'C') insertCoin();
      konamiCheck(e.key);
    });


    var KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
    var konamiIdx = 0;
    function konamiCheck(key) {
      konamiIdx = (key === KONAMI[konamiIdx]) ? konamiIdx + 1 : (key === KONAMI[0] ? 1 : 0);
      if (konamiIdx === KONAMI.length) {
        konamiIdx = 0;
        konamiActivate();
      }
    }
    function konamiActivate() {
      var n = getCoins();
      var added = Math.min(5, MAX_COINS - n);
      saveCoins(Math.min(n + 5, MAX_COINS));
      updateCoinsHud();
      for (var i = 0; i < added; i++) {
        setTimeout(playCoinInsert, i * 90);
      }
      document.body.classList.remove('konami-shake');
      void document.body.offsetWidth;
      document.body.classList.add('konami-shake');
      document.body.addEventListener('animationend', function() {
        document.body.classList.remove('konami-shake');
      }, { once: true });
    }

    /* ------------------------------------------------------------------ */
    /* Hi-score badges on game cards                                        */
    /* ------------------------------------------------------------------ */
    (function () {
      var BASE = 'https://zramohohqnhmfzhlpvok.supabase.co';
      var KEY  = 'sb_publishable_rc_Dp-WhasQoj7gisVbhCg_1XGspuJe';
      var H    = { headers: { apikey: KEY, Authorization: 'Bearer ' + KEY } };
      var CARD = { bouncer: 'card-bouncer', serpent: 'card-serpent',
                   galactic_defender: 'card-galactic', canaris: 'card-canaris' };
      Promise.all([
        fetch(BASE + '/rest/v1/hi_scores?select=game,score', H)
          .then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; }),
        fetch(BASE + '/rest/v1/scores?select=game,initials,score&order=score.desc', H)
          .then(function(r) { return r.ok ? r.json() : []; }).catch(function() { return []; })
      ]).then(function(results) {
        var hiRows = Array.isArray(results[0]) ? results[0] : [];
        var lbRows = Array.isArray(results[1]) ? results[1] : [];
        var topLb = {};
        lbRows.forEach(function(r) { if (!topLb[r.game]) topLb[r.game] = r; });
        hiRows.forEach(function(h) {
          if (!h.score) return;
          var card = document.querySelector('.' + CARD[h.game]);
          if (!card) return;
          var wrap = card.querySelector('.card-shot-wrap');
          if (!wrap) return;
          var badge = document.createElement('div');
          badge.className = 'hiscore-badge';
          var lb = topLb[h.game];
          badge.textContent = (lb && lb.score === h.score)
            ? lb.initials + '  ' + h.score.toLocaleString()
            : h.score.toLocaleString();
          wrap.appendChild(badge);
        });
      }).catch(function(){});
    })();

    /* ------------------------------------------------------------------ */
    /* Starfield                                                            */
    /* ------------------------------------------------------------------ */
    var stars = document.getElementById('stars');
    for (var i = 0; i < 120; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = [
        'left:'    + (Math.random() * 100) + '%',
        'top:'     + (Math.random() * 100) + '%',
        '--d:'     + (2 + Math.random() * 4).toFixed(1) + 's',
        '--delay:' + (Math.random() * 4).toFixed(1) + 's',
        '--lo:'    + (0.05 + Math.random() * 0.1).toFixed(2),
        '--hi:'    + (0.3  + Math.random() * 0.5).toFixed(2),
      ].join(';');
      stars.appendChild(s);
    }
