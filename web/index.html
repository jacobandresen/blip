<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BLIP ARCADE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #32c832;
      --cyan:    #00c8c8;
      --magenta: #c832c8;
      --red:     #dc3232;
      --yellow:  #e6dc32;
    }

    html, body { height: 100%; }

    body {
      background: #050508;
      color: #ccc;
      font-family: 'Courier New', Courier, monospace, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 16px 40px;
      overflow-x: hidden;
    }

    /* CRT overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* ---- header ---- */
    header {
      width: 100%;
      max-width: 900px;
      text-align: center;
      padding: 48px 0 36px;
      position: relative;
    }

    /* ---- language switcher ---- */
    .lang-switcher {
      position: absolute;
      top: 12px;
      right: 0;
      display: flex;
      gap: 5px;
    }

    .lang-btn {
      background: none;
      border: 1px solid #222;
      color: #3a3a3a;
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 5px 9px;
      cursor: pointer;
      transition: color .15s, border-color .15s, text-shadow .15s;
      text-transform: uppercase;
    }

    .lang-btn:hover:not(.active) {
      color: #777;
      border-color: #444;
    }

    .lang-btn.active {
      color: var(--green);
      border-color: var(--green);
      text-shadow: 0 0 8px var(--green);
    }

    /* ---- header text ---- */
    .marquee-line {
      font-size: 11px;
      letter-spacing: 4px;
      color: #333;
      margin-bottom: 20px;
    }

    .arcade-title {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--green);
      text-shadow:
        0 0 10px var(--green),
        0 0 30px var(--green),
        0 0 60px rgba(50,200,50,0.4);
      animation: flicker 8s infinite;
      line-height: 1;
    }

    .arcade-sub {
      font-size: clamp(.9rem, 2.5vw, 1.3rem);
      letter-spacing: .5em;
      color: #555;
      margin-top: 10px;
      text-transform: uppercase;
    }

    @keyframes flicker {
      0%, 95%, 97%, 99%, 100% { opacity: 1; }
      96%, 98% { opacity: 0.7; }
    }

    .insert-coin {
      margin-top: 28px;
      font-size: 14px;
      letter-spacing: 5px;
      color: var(--yellow);
      text-shadow: 0 0 10px var(--yellow);
      animation: blink-coin 1.1s step-end infinite;
      text-transform: uppercase;
    }

    @keyframes blink-coin { 50% { opacity: 0; } }

    .divider {
      width: 100%;
      max-width: 900px;
      height: 1px;
      background: linear-gradient(to right, transparent, #222, transparent);
      margin: 0 auto 40px;
    }

    /* ---- game grid ---- */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px;
    }

    /* ---- card ---- */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid #1e1e1e;
      padding: 28px 24px 24px;
      background: #0a0a0c;
      position: relative;
      transition: transform .15s, box-shadow .2s, border-color .2s;
      cursor: pointer;
    }

    .card:hover { transform: translateY(-3px); }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
    }
    .card::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; }
    .card::after  { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; }

    .card-serpent  { --c: var(--green);   }
    .card-bouncer  { --c: var(--cyan);    }
    .card-galactic { --c: var(--magenta); }

    .card::before, .card::after { border-color: var(--c); }

    .card:hover {
      border-color: var(--c);
      box-shadow:
        0 0 16px rgba(0,0,0,.8),
        0 0 30px color-mix(in srgb, var(--c) 20%, transparent),
        inset 0 0 20px color-mix(in srgb, var(--c) 4%, transparent);
    }

    /* screenshot */
    .card-shot-wrap {
      width: 100%;
      aspect-ratio: 480 / 270;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid color-mix(in srgb, var(--c) 25%, transparent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--c) 15%, transparent);
      background: #000;
    }

    .card-shot {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      image-rendering: pixelated;
      display: block;
      transition: transform .4s ease;
    }

    .card:hover .card-shot { transform: scale(1.04); }

    .card-title {
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: .2em;
      font-weight: 900;
      color: var(--c);
      text-shadow: 0 0 12px color-mix(in srgb, var(--c) 60%, transparent);
      text-transform: uppercase;
      margin-bottom: 6px;
      text-align: center;
    }

    .card-genre {
      font-size: 10px;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-align: center;
    }

    .card-desc {
      font-size: 12px;
      line-height: 1.75;
      color: #555;
      text-align: center;
      letter-spacing: .04em;
      margin-bottom: 24px;
      flex: 1;
    }

    .card-controls {
      font-size: 10px;
      letter-spacing: 1px;
      color: #333;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: center;
    }

    .press-start {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--c);
      text-shadow: 0 0 10px var(--c);
      text-transform: uppercase;
      border: 1px solid var(--c);
      padding: 8px 20px;
      animation: blink-start 1.3s step-end infinite;
      box-shadow: 0 0 10px color-mix(in srgb, var(--c) 20%, transparent);
      white-space: nowrap;
    }

    @keyframes blink-start { 50% { opacity: 0.3; } }

    .card:hover .press-start {
      animation: none;
      opacity: 1;
      box-shadow:
        0 0 16px color-mix(in srgb, var(--c) 50%, transparent),
        inset 0 0 8px color-mix(in srgb, var(--c) 15%, transparent);
    }

    /* ---- footer ---- */
    footer {
      margin-top: 48px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
      color: #2a2a2a;
      text-transform: uppercase;
      line-height: 2;
    }

    /* ---- stars ---- */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 1px;
      height: 1px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) var(--delay) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: var(--lo); }
      to   { opacity: var(--hi); }
    }

    header, .divider, .game-grid, footer { position: relative; z-index: 1; }

    /* ---- coin / credits ---- */
    .insert-coin { cursor: pointer; user-select: none; }

    @keyframes coin-shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      40%       { transform: translateX(5px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(3px); }
    }
    .coin-shake { animation: coin-shake 0.28s ease !important; }

    .credits-display {
      margin-top: 14px;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
      text-transform: uppercase;
    }
    .credits-icons { letter-spacing: 4px; }

    /* ---- mastodon badge ---- */
    .mastodon-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #444;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color .2s;
    }

    .mastodon-badge:hover { color: var(--green); }

    .mastodon-badge:hover .mastodon-handle { opacity: 1; transform: translateX(0); }

    .mastodon-handle {
      opacity: 0;
      transform: translateX(6px);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
      text-shadow: 0 0 8px var(--green);
      color: var(--green);
    }

    .mastodon-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #222;
      display: block;
      transition: border-color .2s, box-shadow .2s;
      image-rendering: auto;
      filter: grayscale(40%) brightness(0.8);
    }

    .mastodon-badge:hover .mastodon-avatar {
      border-color: var(--green);
      box-shadow: 0 0 12px color-mix(in srgb, var(--green) 50%, transparent);
      filter: none;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <header>
    <div class="lang-switcher">
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ja">日本語</button>
      <button class="lang-btn" data-lang="da">DA</button>
    </div>

    <div class="marquee-line" data-i18n="marquee"></div>
    <div class="arcade-title">BLIP ARCADE</div>
    <div class="arcade-sub" data-i18n="subtitle"></div>
    <div class="insert-coin" id="insert-coin" data-i18n="insertCoin"></div>
    <div class="credits-display" id="credits-display" style="display:none">
      CREDITS <span id="credits-count">0</span> &nbsp;<span class="credits-icons" id="credits-icons"></span>
    </div>
  </header>

  <div class="divider"></div>

  <div class="game-grid">

    <!-- SERPENT -->
    <a class="card card-serpent" href="serpent/index.html">
      <div class="card-shot-wrap">
        <img class="card-shot" src="serpent/screenshot.png" alt="Serpent gameplay">
      </div>
      <div class="card-title">SERPENT</div>
      <div class="card-genre"  data-i18n="serpentGenre"></div>
      <div class="card-desc"   data-i18n="serpentDesc"></div>
      <div class="card-controls" data-i18n="serpentControls"></div>
      <div class="press-start" data-i18n="pressStart"></div>
    </a>

    <!-- BOUNCER -->
    <a class="card card-bouncer" href="bouncer/index.html">
      <div class="card-shot-wrap">
        <img class="card-shot" src="bouncer/screenshot.png" alt="Bouncer gameplay">
      </div>
      <div class="card-title">BOUNCER</div>
      <div class="card-genre"  data-i18n="bouncerGenre"></div>
      <div class="card-desc"   data-i18n="bouncerDesc"></div>
      <div class="card-controls" data-i18n="bouncerControls"></div>
      <div class="press-start" data-i18n="pressStart"></div>
    </a>

    <!-- GALACTIC DEFENDER -->
    <a class="card card-galactic" href="galactic_defender/index.html">
      <div class="card-shot-wrap">
        <img class="card-shot" src="galactic_defender/screenshot.png" alt="Galactic Defender gameplay">
      </div>
      <div class="card-title">GALACTIC<br>DEFENDER</div>
      <div class="card-genre"  data-i18n="galacticGenre"></div>
      <div class="card-desc"   data-i18n="galacticDesc"></div>
      <div class="card-controls" data-i18n="galacticControls"></div>
      <div class="press-start" data-i18n="pressStart"></div>
    </a>

  </div>

  <a class="mastodon-badge" href="https://mastodon.gamedev.place/@jacobandresen" target="_blank" rel="noopener">
    <span class="mastodon-handle">@jacobandresen</span>
    <img class="mastodon-avatar"
         src="https://cdn.masto.host/mastodongamedevplace/accounts/avatars/109/415/513/568/161/510/original/ba0f2c84d53b9881.jpg"
         alt="Jacob Andresen on Mastodon">
  </a>

  <footer>
    <div data-i18n="footerControls"></div>
    <div style="margin-top:8px" data-i18n="footerCopy"></div>
  </footer>

  <script>
    /* ------------------------------------------------------------------ */
    /* Translations                                                         */
    /* ------------------------------------------------------------------ */
    var i18n = {

      en: {
        marquee:          '&#x25A0; &#x25A0; &#x25A0; &nbsp; WELCOME FOR PLAYER ONE IS ARRIVE HERE &nbsp; &#x25A0; &#x25A0; &#x25A0;',
        subtitle:         'THE CLASSIC GAME',
        insertCoin:       '&#x25BA; PLEASE TO INSERT COIN &#x25C4;',

        serpentGenre:     'SNAKE MOVING GAME',
        serpentDesc:      'Making snake for eat thing and become large size.<br>Not to touching wall or own body is important much.<br>How much long snake you are achieve?',
        serpentControls:  'PUSH WASD / ARROW KEY FOR MOVE',

        bouncerGenre:     'BRICK BREAK GAME',
        bouncerDesc:      'Ball is must break all brick for become empty board.<br>Paddle must not allow ball escape to fall below.<br>Clear stage happen, next stage will arrive.',
        bouncerControls:  'PUSH A/D OR ARROW &middot; SPACE KEY FOR LAUNCH BALL',

        galacticGenre:    'SPACE ALIEN ATTACK GAME',
        galacticDesc:     'Many alien spaceship is coming very close near now.<br>Please for shoot all before they arrive on ground.<br>Must defend Earth happening at every cost situation.',
        galacticControls: 'PUSH A/D OR ARROW &middot; SPACE KEY FOR SHOOT',

        pressStart:       'PUSH START BUTTON',
        footerControls:   'PUSH WASD OR ARROW KEY &nbsp;&mdash;&nbsp; SPACE IS FOR SHOOT OR FOR LAUNCH',
        footerCopy:       'BLIP ARCADE &nbsp;&#x25A0;&nbsp; ALL RIGHT IS RESERVE'
      },

      ja: {
        marquee:          '&#x25A0; &#x25A0; &#x25A0; &nbsp; プレイヤーワン、ようこそ &nbsp; &#x25A0; &#x25A0; &#x25A0;',
        subtitle:         'クラシックゲーム',
        insertCoin:       '&#x25BA; コインをいれてください &#x25C4;',

        serpentGenre:     'スネークゲーム',
        serpentDesc:      'ヘビを操作してエサを食べ、どんどん成長しよう。<br>壁や自分の体にぶつかってはいけない。<br>どこまで長くなれるか？',
        serpentControls:  'WASD / 矢印キー',

        bouncerGenre:     'ブロック崩し',
        bouncerDesc:      'ボールで全てのブロックを壊せ。<br>ボールをパドルの下に落とすな。<br>全部壊してステージクリア。',
        bouncerControls:  'A/D または矢印 &middot; スペースで発射',

        galacticGenre:    'スペースインベーダー',
        galacticDesc:     'エイリアンの大群が迫ってくる。<br>着地する前に全滅させろ。<br>地球を守り抜け。',
        galacticControls: 'A/D または矢印 &middot; スペースで射撃',

        pressStart:       'スタート',
        footerControls:   'WASD または 矢印キー &nbsp;―&nbsp; スペースで撃つ・発射',
        footerCopy:       'BLIP ARCADE &nbsp;&#x25A0;&nbsp; 全権利保留'
      },

      da: {
        marquee:          '&#x25A0; &#x25A0; &#x25A0; &nbsp; VELKOMMEN SPILLER ET &nbsp; &#x25A0; &#x25A0; &#x25A0;',
        subtitle:         'KLASSISKE SPIL',
        insertCoin:       '&#x25BA; INDS&AElig;T M&Oslash;NT &#x25C4;',

        serpentGenre:     'SLANGEBANE',
        serpentDesc:      'Styr slangen til at spise og vokse.<br>Undg&aring; at ramme v&aelig;ggene eller dig selv.<br>Hvor lang kan du blive?',
        serpentControls:  'WASD / PILETASTER',

        bouncerGenre:     'KLODSBRÆKKER',
        bouncerDesc:      'Br&aelig;k alle klodser med bolden.<br>Lad ikke bolden slippe forbi dit bat.<br>Ryd banen for at avancere.',
        bouncerControls:  'A/D ELLER PILE &middot; MELLEMRUM FOR START',

        galacticGenre:    'RUMANGRIBER',
        galacticDesc:     'Alienbølger er på vej ind.<br>Skyd dem ned inden de lander.<br>Forsvar Jorden for enhver pris.',
        galacticControls: 'A/D ELLER PILE &middot; MELLEMRUM FOR SKYD',

        pressStart:       'TRYK START',
        footerControls:   'WASD ELLER PILETASTER &nbsp;&mdash;&nbsp; MELLEMRUM FOR AT SKYDE ELLER AFFYRE',
        footerCopy:       'BLIP ARCADE &nbsp;&#x25A0;&nbsp; ALLE RETTIGHEDER FORBEHOLDES'
      }
    };

    /* ------------------------------------------------------------------ */
    /* Language application                                                 */
    /* ------------------------------------------------------------------ */
    function applyLang(lang) {
      var t = i18n[lang];
      if (!t) return;

      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.innerHTML = t[key];
      });

      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
      });

      document.documentElement.lang = lang;
      try { localStorage.setItem('blip-lang', lang); } catch(e) {}
    }

    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        applyLang(this.getAttribute('data-lang'));
      });
    });

    /* load saved language, fall back to browser preference, then English */
    (function() {
      var saved = null;
      try { saved = localStorage.getItem('blip-lang'); } catch(e) {}
      var browserLang = (navigator.language || '').slice(0, 2).toLowerCase();
      var lang = saved || (i18n[browserLang] ? browserLang : 'en');
      applyLang(lang);
    })();

    /* ------------------------------------------------------------------ */
    /* Coin / credits                                                       */
    /* ------------------------------------------------------------------ */
    var MAX_COINS  = 5;
    var coinCount  = 0;
    var audioCtx   = null;

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playCoinInsert() {
      var ctx = getAudio();
      var t   = ctx.currentTime;
      // Two-note metallic clink (C6 → E6)
      [{ freq: 1047, start: 0 }, { freq: 1319, start: 0.055 }].forEach(function(note) {
        var osc  = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.value = note.freq;
        gain.gain.setValueAtTime(0.22, t + note.start);
        gain.gain.exponentialRampToValueAtTime(0.001, t + note.start + 0.11);
        osc.start(t + note.start);
        osc.stop(t + note.start + 0.12);
      });
    }

    function playNoRoom() {
      var ctx  = getAudio();
      var t    = ctx.currentTime;
      // Descending buzzer — sawtooth from 200Hz → 65Hz
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(65, t + 0.38);
      gain.gain.setValueAtTime(0.32, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      osc.start(t);
      osc.stop(t + 0.39);
    }

    function updateCreditsDisplay() {
      var icons = '';
      for (var i = 0; i < MAX_COINS; i++)
        icons += i < coinCount ? '&#x25CF;' : '&#x25CB;';
      document.getElementById('credits-icons').innerHTML = icons;
      document.getElementById('credits-count').textContent = coinCount;
      document.getElementById('credits-display').style.display = coinCount > 0 ? '' : 'none';
    }

    function insertCoin() {
      if (coinCount < MAX_COINS) {
        coinCount++;
        playCoinInsert();
        updateCreditsDisplay();
      } else {
        playNoRoom();
        var el = document.getElementById('insert-coin');
        el.classList.remove('coin-shake');
        void el.offsetWidth; // reflow to restart animation
        el.classList.add('coin-shake');
        el.addEventListener('animationend', function() { el.classList.remove('coin-shake'); }, { once: true });
      }
    }

    document.getElementById('insert-coin').addEventListener('click', insertCoin);

    document.addEventListener('keydown', function(e) {
      // "5" (MAME coin key) or "c"
      if (e.key === '5' || e.key === 'c' || e.key === 'C') insertCoin();
    });

    /* ------------------------------------------------------------------ */
    /* Starfield                                                            */
    /* ------------------------------------------------------------------ */
    var stars = document.getElementById('stars');
    for (var i = 0; i < 120; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = [
        'left:'    + (Math.random() * 100) + '%',
        'top:'     + (Math.random() * 100) + '%',
        '--d:'     + (2 + Math.random() * 4).toFixed(1) + 's',
        '--delay:' + (Math.random() * 4).toFixed(1) + 's',
        '--lo:'    + (0.05 + Math.random() * 0.1).toFixed(2),
        '--hi:'    + (0.3  + Math.random() * 0.5).toFixed(2),
      ].join(';');
      stars.appendChild(s);
    }
  </script>
</body>
</html>
